    <style>
        .welcome-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 50px;
        }
        .user-avatar {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 20px;
        }
        .welcome-title {
            font-size: 2.5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        .user-details {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid rgba(255,255,255,0.5);
        }
        .user-detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .user-detail-row:last-child {
            border-bottom: none;
        }
        .user-detail-label {
            font-weight: 600;
            opacity: 0.9;
        }
        .user-detail-value {
            font-weight: 500;
        }
        .btn-logout {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            transition: all 0.3s;
        }
        .btn-logout:hover {
            background: white;
            color: #667eea;
        }
        .btn-home {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
        }
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = 'http://localhost:5000/api';

    // Check authentication
    function checkAuth() {
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        if (!token || !user) {
            window.location.href = 'signin.html';
            return;
        }

        // Display welcome message
        const firstName = user.name.split(' ')[0];
        document.getElementById('welcomeMessage').innerHTML = `Welcome, ${firstName}! 👋`;

        // Display user details
        document.getElementById('userDetails').innerHTML = `
            <div class="user-detail-row">
                <span class="user-detail-label"><i class="fas fa-user me-2"></i>Full Name</span>
                <span class="user-detail-value">${user.name}</span>
            </div>
            <div class="user-detail-row">
                <span class="user-detail-label"><i class="fas fa-envelope me-2"></i>Email</span>
                <span class="user-detail-value">${user.email}</span>
            </div>
            <div class="user-detail-row">
                <span class="user-detail-label"><i class="fas fa-id-card me-2"></i>User ID</span>
                <span class="user-detail-value">#${user.id}</span>
            </div>
        `;
    }

    // Logout function
    async function handleLogout() {
        const token = localStorage.getItem('token');

        try {
            await fetch(`${API_URL}/logout`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });
        } catch (error) {
            console.error('Logout error:', error);
        }

        // Clear localStorage
        localStorage.removeItem('token');
        localStorage.removeItem('user');

        // Redirect
        window.location.href = 'signin.html';
    }

    // Logout button handlers
    document.getElementById('logoutBtn').addEventListener('click', handleLogout);
    document.getElementById('logoutNavBtn').addEventListener('click', handleLogout);

    // Check auth on page load
    checkAuth();
</script>
<script src="assets/js/firebase-config.js"></script>
